<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>WASM Kernel Smoke Test</title>
    <style>
        body {
            font-family: monospace;
            background: #111;
            color: #eee;
            padding: 2rem;
        }

        button {
            padding: 0.5rem 1rem;
            cursor: pointer;
            background: #6c63ff;
            color: white;
            border: none;
            border-radius: 4px;
        }

        #log {
            margin-top: 1rem;
            white-space: pre-wrap;
            color: #00d4aa;
        }
    </style>
</head>

<body>

    <h2>BenchD — WASM Kernel Smoke Test</h2>
    <button id="run-btn">Run WASM Tests</button>
    <div id="log"></div>

    <!-- We must load main.js first so the Service Worker registers and SharedArrayBuffer is enabled! -->
    <script src="./src/main.js" type="module"></script>

    <script type="module">
        import init, {
            bench_fp32,
            bench_fp64,
            bench_int,
            bench_simd_auto,
            bench_memory_bandwidth,
            bench_cache_latency
        } from './wasm/pkg/benchd_wasm.js';

        const logEl = document.getElementById('log');
        function log(msg) {
            console.log(msg);
            logEl.textContent += msg + '\n';
        }

        document.getElementById('run-btn').addEventListener('click', async () => {
            logEl.textContent = 'Initializing WASM...\n';

            try {
                await init();
                log('✅ WASM Module Loaded');

                const iters = 100_000_000;

                // FP32
                log('⏳ Running FP32 test...');
                let start = performance.now();
                // Using 0.99999 prevents infinity overflow
                let resF32 = bench_fp32(iters, 1.0, 0.99999, 0.00001);
                let timeF32 = performance.now() - start;
                let gflopsF32 = ((iters * 10) / (timeF32 / 1000)) / 1e9;
                log(`   Res: ${resF32.toPrecision(5)} | Time: ${timeF32.toFixed(1)}ms | Perf: ${gflopsF32.toFixed(2)} GFLOPS`);

                // FP64
                log('⏳ Running FP64 test...');
                start = performance.now();
                let resF64 = bench_fp64(iters, 1.0, 0.9999999, 0.0000001);
                let timeF64 = performance.now() - start;
                let gflopsF64 = ((iters * 10) / (timeF64 / 1000)) / 1e9;
                log(`   Res: ${resF64.toPrecision(5)} | Time: ${timeF64.toFixed(1)}ms | Perf: ${gflopsF64.toFixed(2)} GFLOPS`);

                // Integer (u64 args in wasm-bindgen take JS BigInts)
                log('⏳ Running Integer test...');
                start = performance.now();
                let resInt = bench_int(iters, 1n, 2n, 3n);
                let timeInt = performance.now() - start;
                let gopsInt = ((iters * 10) / (timeInt / 1000)) / 1e9;
                log(`   Res: ${resInt} | Time: ${timeInt.toFixed(1)}ms | Perf: ${gopsInt.toFixed(2)} GOPS`);

                // SIMD Auto
                log('⏳ Running SIMD Auto test...');
                start = performance.now();
                let resSimd = bench_simd_auto(iters, 1.0, 0.99999, 0.00001);
                let timeSimd = performance.now() - start;
                log(`   Res: ${resSimd.toPrecision(5)} | Time: ${timeSimd.toFixed(1)}ms`);

                // Memory Bandwidth
                log('⏳ Running Memory Bandwidth test...');
                const bufSize = 1024 * 1024 * 32; // 256MB
                log(`   Allocating 256MB Float64Array in JS...`);
                let memData = new Float64Array(bufSize);
                start = performance.now();
                let resMem = bench_memory_bandwidth(memData);
                let timeMem = performance.now() - start;
                log(`   Res: ${resMem.toPrecision(5)} | Time: ${timeMem.toFixed(1)}ms`);

                log('\n🎉 All done!');
            } catch (err) {
                log(`❌ Error: ${err.message}`);
                console.error(err);
            }
        });
    </script>
</body>

</html>
